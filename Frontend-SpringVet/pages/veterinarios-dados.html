<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/veterinario-dados.css">
    <title>Veterinário Dados</title>
</head>
<body>
    <nav id="navbar"></nav>

    <main class="container">

        <div class="flex-box-veterinario">
            
            <div class="perfil-veterinario"></div>

            <div class="dados-veterinario">
                <p><strong>Nome: </strong><span>João Gabriel</span></p>
                <p><strong>Especialidade: </strong> <span>Cardiologia</span></p>
                <p><strong>CRMV: </strong><span>12345-6</span></p>
                <p><strong>Email: </strong><span>joaogabrielm591@gmail.com</span></p>
                <p><strong>Telefone: </strong><span>(11) 97646-8515</span></p>
                
                <div class="card-btn">
                    
                    <button id="btn-editar-veterinario" class="btn-info">
                        <span class="material-symbols-outlined">
                            edit
                        </span>
                    </button>
                    <button class="btn-confirm">
                        <span class="material-symbols-outlined">
                            history
                        </span>
                    </button>
                    <button class="btn-delete">
                        <span class="material-symbols-outlined">
                            delete
                        </span>
                    </button>
                </div>
            </div>
        </div>

        <div class="flex-box-consultas">
            <h1>Agenda</h1>
            <div class="filtros">
                <input class="input-text" type="search" placeholder="">

                <input class="input-text-secondary" type="date" name="" id="">

                <button class="btn-search-secondary">Buscar</button>
            </div>

            <div></div>
        </div>
    </main>

    <dialog id="modal-editar-veterinario">

        <h2>Editar Veterinário</h2>

        <form>
            <input class="input-text" type="text" name="nome" placeholder="Nome">
            <input class="input-text" type="text" name="especialidade" placeholder="Especialidade">
            <input class="input-text" type="text" name="crmv" placeholder="CRMV">
            <input class="input-text" type="email" name="email" placeholder="Email">
            <input class="input-text" type="text" name="telefone" placeholder="Telefone">

            <div class="modal-botoes">
                <button id="cancelar-editar-veterinario" class="btn-delete" type="button">Cancelar</button>
                <button class="btn-confirm" type="submit">Salvar</button>
            </div>
        </form>
    </dialog>



    <script src="../js/navbar.js"></script>
    <script src="../js/modais-veterinario.js"></script>
    <script src="../js/card-consultas.js"></script>
</body>
</html>
