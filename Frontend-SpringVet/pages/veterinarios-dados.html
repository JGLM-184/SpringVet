<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/veterinario-dados.css">
    <title>Veterinário Dados</title>
</head>

<body>
    <nav id="navbar"></nav>

    <div class="voltar">
        <a class="btn btn-secondary" href="../pages/veterinarios.html">
            <span class="material-symbols-outlined">
                arrow_back
            </span>
        </a>
    </div>

    <main class="container">

        <div class="flex-box-veterinario">

            <div class="perfil-veterinario"></div>

            <div class="dados-veterinario">
                <p><strong>Nome: </strong> <span id="nome"></span></p>
                <p><strong>Especialidade: </strong> <span id="especialidade"></span></p>
                <p><strong>CRMV: </strong> <span id="crmv"></span></p>
                <p><strong>Email: </strong> <span id="email"></span></p>
                <p><strong>Telefone: </strong> <span id="telefone"></span></p>
                <p><strong>Status: </strong> <span id="status"></span></p>

                <div class="card-btn">

                    <button id="btn-editar-veterinario" class="btn btn-secondary">
                        <span class="material-symbols-outlined">
                            edit
                        </span>
                    </button>
                    <button class="btn btn-info">
                        <span class="material-symbols-outlined">
                            history
                        </span>
                    </button>
                    <button id="btn-status-veterinario" class="btn">
                        <span class="material-symbols-outlined"></span>
                    </button>

                    <!--
                    <button class="btn btn-danger">
                        <span class="material-symbols-outlined">
                            delete
                        </span>
                    </button>

                    -->
                </div>
            </div>
        </div>

        <div class="flex-box-consultas">
            <h1>Agenda</h1>
            <div class="filtros">
                <input class="input-text" type="search" placeholder="Nome do animal">

                <input class="input-text-secondary" type="date" name="" id="">

                <button class="btn btn-outline-light">Buscar</button>
            </div>

            <div></div>
        </div>
    </main>

    <dialog id="modal-editar-veterinario">

        <h2>Editar Veterinário</h2>

        <form>
            <input class="input-text" type="text" name="nome" placeholder="Nome" required>
            <select class="input-text" name="especialidade" required>
                <option value="" disabled selected>Especialidade</option>
                <option>Geral</option>
                <option>Dermatologia</option>
                <option>Cardiologia</option>
                <option>Oftalmologia</option>
                <option>Ortopedia/Traumatologia</option>
                <option>Oncologia</option>
                <option>Anestesiologia</option>
                <option>Odontologia</option>
            </select>
            <input class="input-text" type="text" name="crmv" placeholder="CRMV" required>
            <input class="input-text" type="email" name="email" placeholder="Email" required>
            <input class="input-text" type="text" name="telefone" placeholder="Telefone" required>

            <div class="modal-botoes">
                <button id="cancelar-editar-veterinario" class="btn btn-danger" type="button">Cancelar</button>
                <button class="btn btn-primary" type="submit">Salvar</button>
            </div>
        </form>
    </dialog>



    <script src="../js/navbar.js"></script>
    <script src="../js/modais.js"></script>
    <script src="../js/veterinarios-dados.js"></script>
    <script src="../js/card-consultas.js"></script>
</body>

</html>
