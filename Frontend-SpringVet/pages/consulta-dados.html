<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/consulta-dados.css">
    <title>Dados Consulta</title>
</head>

<body>
    <nav id="navbar"></nav>

    <div class="voltar">
        <a class="btn btn-secondary" href="../pages/consultas.html">
            <span class="material-symbols-outlined">
                arrow_back
            </span>
        </a>
    </div>

    <main class="container">
        <div class="flex-box-dados">
        <h1>Animal</h1>
        <div class="dados">
            <p><strong>Nome: </strong><span id="animal-nome"></span></p>
            <p><strong>Espécie: </strong><span id="animal-especie"></span></p>
            <p><strong>Raça: </strong><span id="animal-raca"></span></p>
            <p><strong>Cor: </strong><span id="animal-cor"></span></p>
            <p><strong>Sexo: </strong><span id="animal-sexo"></span></p>
            <p><strong>Castrado: </strong><span id="animal-castrado"></span></p>
            <p><strong>Nascimento: </strong><span id="animal-nascimento"></span></p>
            <p><strong>Tutor: </strong><span id="animal-tutor"></span></p>
        </div>

        <h1>Veterinário</h1>
        <div class="dados">
            <p><strong>Nome: </strong><span id="vet-nome"></span></p>
            <p><strong>Especialidade: </strong><span id="vet-especialidade"></span></p>
            <p><strong>CRMV: </strong><span id="vet-crmv"></span></p>
            <p><strong>Email: </strong><span id="vet-email"></span></p>
            <p><strong>Telefone: </strong><span id="vet-telefone"></span></p>
        </div>

        </div>
        <div class="flex-box-consulta">

        <div class="consulta-header">
            <h1>Consulta</h1>
            <span id="status-consulta"></span>
        </div>

        <div class="dados consulta-info">
            <h2>Informações</h2>
            <p><strong>Data:</strong> <span id="consulta-data"></span></p>
            <p><strong>Motivo:</strong> <span id="consulta-motivo"></span></p>
            <p><strong>Observação:</strong> <span id="consulta-observacao"></span></p>
        </div>

        <div class="dados consulta-financeiro">
            <h2>Financeiro</h2>
            <p><strong>Valor:</strong> <span id="consulta-valor"></span></p>
            <p><strong>Forma de pagamento:</strong> <span id="consulta-forma"></span></p>
            <p><strong>Paga:</strong> <span id="consulta-paga" class="badge"></span></p>
            <p><strong>Data de criação:</strong> <span id="consulta-criacao"></span></p>
        </div>

            <div class="consulta-actions">
                <button id="btn-editar-consulta" class="btn btn-secondary">
                    <span class="material-symbols-outlined">edit</span>
                </button>
                <button id="btn-cancelar-consulta" class="btn btn-danger">Cancelar</button>
                <button id="btn-finalizar-consulta" class="btn btn-primary">Finalizar</button>
            </div>
        </div>
    </main>


    <dialog id="modal-editar-consulta">
        <h2>Editar Consulta</h2>
        <form>
            <input class="input-text" type="text" name="animal" readonly>
            <select class="input-text" name="veterinario" required>
                <option value="" disabled selected>Veterinario</option>
            </select>
            <input class="input-text" type="datetime-local" name="data-hora" placeholder="Data e horário" required>
            <input class="input-text" type="text" name="motivo" placeholder="Motivo" required>
            <input class="input-text" type="text" name="observacao" placeholder="Observação" required>
            <input class="input-text" type="text" name="valor" placeholder="Valor" required>
            <input class="input-text" type="text" name="forma-pagamento" placeholder="Forma de pagamento" required>

            <div class="modal-botoes">
                <button id="cancelar-editar-consulta" class="btn btn-danger" type="button">Cancelar</button>
                <button class="btn btn-primary" type="submit">Salvar</button>
            </div>
        </form>
    </dialog>



    <script src="../js/navbar.js"></script>
    <script src="../js/consulta-dados.js"></script>
</body>

</html>
