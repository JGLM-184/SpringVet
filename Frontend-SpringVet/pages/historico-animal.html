<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/historico-animal.css">
    <title>Histórico - Animal</title>
</head>
<body>
    <nav id="navbar"></nav>

    <div class="voltar">
        <a class="btn btn-secondary" href="../pages/tutores-dados.html">
            <span class="material-symbols-outlined">
                arrow_back
            </span>
        </a>
    </div>

    <main class="container">
        <div class="flex-box-dados">
            <h1>Animal</h1>
            <div class="dados">
                <p><strong>Nome: </strong><span id="animal-nome"></span></p>
                <p><strong>Espécie: </strong><span id="animal-especie"></span></p>
                <p><strong>Raça: </strong><span id="animal-raca"></span></p>
                <p><strong>Cor: </strong><span id="animal-cor"></span></p>
                <p><strong>Sexo: </strong><span id="animal-sexo"></span></p>
                <p><strong>Castrado: </strong><span id="animal-castrado"></span></p>
                <p><strong>Nascimento: </strong><span id="animal-nascimento"></span></p>
                <p><strong>Tutor: </strong><span id="animal-tutor"></span></p>
            </div>
        </div>

        <div class="flex-box-consulta">
            <h2>Consultas</h2>

            <div class="filtros">
            <select class="input-text" name="status" id="status">
                <option value="">Todas</option>
                <option value="AGENDADA">Agendada</option>
                <option value="FINALIZADA">Finalizada</option>
                <option value="CANCELADA">Cancelada</option>
            </select>
            <input class="input-text" type="date">
        </div>

            <div id="historico-animal"></div>
        </div>
    </main>

    <script src="/js/navbar.js"></script>
    <script src="/js/historico-animal.js"></script>

</body>
</html>
