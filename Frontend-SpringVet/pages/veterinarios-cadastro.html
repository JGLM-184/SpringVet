<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/veterinario-cadastro.css">

    <title>Cadastro Veterinário</title>
</head>
<body>
    <nav id="navbar"></nav>

    <main class="container">

        <form action="">
            <h1 class="titulo">Veterinário</h1>

        <input class="input-text" type="text" name="nome" placeholder="Nome">

        <select name="especialidade">
                <option value="">Especialidade</option>
                <option>Geral</option>
                <option>Dermatologia</option>
                <option>Cardiologia</option>
                <option>Oftalmologia</option>
                <option>Ortopedia/Traumatologia</option>
                <option>Oncologia</option>
                <option>Anestesiologia</option>
                <option>Odontologia</option>
            </select>

        <input class="input-text" type="text" name="crmv" placeholder="CRMV">

        <input class="input-text" type="text" name="telefone" placeholder="Telefone">

        <input class="input-text" type="text" name="email" placeholder="E-mail">

        <div class="acoes-veterinario">
            <button class="btn-confirm" type="submit">Cadastrar</button>
        </div>
        </form>

    </main>

    <script src="../js/navbar.js"></script>
</body>
</html>
