<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/tutores-cadastro.css">
    <link rel="shortcut icon" href="../assets/icone.ico" type="image/x-icon">
    <title>Novo Tutor</title>
</head>

<body>

    <nav id="navbar"></nav>

    <div class="voltar">
        <a class="btn btn-secondary" href="../pages/tutores.html">
            <span class="material-symbols-outlined">
                arrow_back
            </span>
        </a>
    </div>

    <main class="container">
        <form class="form-grid">
            <div class="flex-box-tutor">
                <h1 class="titulo">Tutor</h1>

                <input class="input-text" required type="text" name="nome" placeholder="Nome">
                <input class="input-text" required type="text" name="cpf" placeholder="CPF">
                <input class="input-text" required type="email" name="email" placeholder="Email">
                <input class="input-text" required type="text" name="telefone" placeholder="Telefone">

                <div class="acoes-tutor">
                    <button class="btn btn-primary" type="submit">Cadastrar</button>
                </div>
            </div>

            <div class="col-animais">

                <div class="header-animais">
                    <h2>Animais</h2>
                    <button class="btn btn-primary" type="button" onclick="adicionarAnimal()">Novo animal</button>
                </div>

                <div id="cadastrar-animais">

                </div>
            </div>
        </form>

    </main>

    <script src="../js/auth.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/cadastrar-animais.js"></script>
    <script src="../js/tutores-cadastro.js"></script>

</body>

</html>
