<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/veterinarios.css">
    <title>Veterinários</title>
</head>
<nav id="navbar"></nav>
<main class="container">

    <div class="filtros">
        <input id="input-nome-vet" class="input-text" type="text" placeholder="Nome do veterinário">

        <select id="select-especialidade" class="input-text-secondary" name="especialidade">
            <option value="">Especialidade</option>
            <option>Geral</option>
            <option>Dermatologia</option>
            <option>Cardiologia</option>
            <option>Oftalmologia</option>
            <option>Ortopedia/Traumatologia</option>
            <option>Oncologia</option>
            <option>Anestesiologia</option>
            <option>Odontologia</option>
        </select>

        <label class="checkbox-container">
            <input type="checkbox" id="check-inativos">
            <span>Inativos</span>
        </label>
        
        <button id="btn-buscar-vet" class="btn btn-outline">Buscar</button>

        <a href="/pages/veterinarios-cadastro.html">
            <button class="btn btn-secondary">Novo</button>
        </a>
    </div>

    <div class="flex-box-veterinarios"></div>
</main>

<script src="../js/navbar.js"></script>
<script src="../js/veterinarios.js"></script>
</body>

</html>
