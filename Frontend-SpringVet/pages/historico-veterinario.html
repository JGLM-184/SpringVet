<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/historico-veterinario.css">
    <link rel="shortcut icon" href="../assets/icone.ico" type="image/x-icon">
    <title>Histórico - Veterinario</title>
</head>
<body>
    <nav id="navbar"></nav>

    <div class="voltar">
        <a class="btn btn-secondary" href="../pages/veterinarios-dados.html">
            <span class="material-symbols-outlined">
                arrow_back
            </span>
        </a>
    </div>

    <main class="container">
        <div class="flex-box-consulta">
            <h2>Consultas</h2>

            <div class="filtros">
            <select class="input-text" name="status" id="status">
                <option value="">Todas</option>
                <option value="AGENDADA">Agendada</option>
                <option value="FINALIZADA">Finalizada</option>
                <option value="CANCELADA">Cancelada</option>
            </select>
            <input class="input-text" type="date">
        </div>

            <div id="historico-veterinario"></div>
        </div>
    </main>

    <script src="../js/auth.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/historico-veterinario.js"></script>

</html>
