<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/tutores-dados.css">
    <title>Dados Tutor</title>
</head>

<body>
    <nav id="navbar"></nav>

    <div class="voltar">
        <a class="btn btn-secondary" href="../pages/tutores.html">
            <span class="material-symbols-outlined">
                arrow_back
            </span>
        </a>
    </div>

    <main class="container">
        <div class="flex-box-tutor">
            <div class="perfil-tutor"> </div>

            <div class="dados-tutor">
                <p><strong>Nome: </strong> <span id="nome"></span> </p>
                <p><strong>CPF: </strong> <span id="cpf"></span> </p>
                <p><strong>Email: </strong> <span id="email"></span> </p>
                <p><strong>Telefone: </strong> <span id="telefone"></span> </p>

                <div class="card-btn">
                    <button id="btn-editar-tutor" class="btn btn-secondary">
                        <span class="material-symbols-outlined">
                            edit
                        </span>
                    </button>
                    <button id="btn-excluir-tutor" class="btn btn-danger">
                        <span class="material-symbols-outlined">
                            delete
                        </span>
                    </button>
                </div>
            </div>

        </div>
        <div class="flex-box-animais">
            <h1>Animais</h1>

            <div class="filtros">
                <input id="input-nome-animal" class="input-text" type="text" placeholder="Nome do animal">
                <button id="btn-buscar-animal" class="btn btn-outline-light">Buscar</button>
                <button id="btn-novo-animal" class="btn btn-secondary">Novo</button>
            </div>

            <div class="container-cards-animais">
            </div>
        </div>
    </main>

    <!-- EDITAR TUTOR -->

    <dialog id="modal-editar-tutor">
        <h2>Editar Tutor</h2>
        <form>
            <input class="input-text" required type="text" name="nome" placeholder="Nome">
            <input class="input-text" required type="text" name="cpf" placeholder="CPF">
            <input class="input-text" required type="email" name="email" placeholder="Email">
            <input class="input-text" required type="text" name="telefone" placeholder="Telefone">

            <div class="modal-botoes">
                <button id="cancelar-editar-tutor" class="btn btn-danger" type="button">Cancelar</button>
                <button class="btn btn-primary" type="submit">Salvar</button>
            </div>
        </form>
    </dialog>

    <!-- EDITAR ANIMAL -->

    <dialog id="modal-editar-animal">
        <h2>Editar Animal</h2>
        <form>
            <input class="input-text" required type="text" name="nome" placeholder="Nome">
            <select class="input-text" name="especie">
                <option value="">Espécie</option>
                <option>Cachorro</option>
                <option>Gato</option>
            </select>

            <input class="input-text" required type="text" name="raca" placeholder="Raça">

            <input class="input-text" required type="text" name="cor" placeholder="Cor">

            <select class="input-text" name="sexo">
                <option value="">Sexo</option>
                <option>Macho</option>
                <option>Fêmea</option>
            </select>

            <input class="input-text" required type="date" name="nasc" placeholder="Data de nascimento">

            <label>Castrado?</label>
            <div class="group-radio">
                <div>
                    <input class="radio-btn" required type="radio" name="castrado" value="true">
                    <label>Sim</label>
                </div>

                <div>
                    <input class="radio-btn" type="radio" name="castrado" value="false">
                    <label>Não</label>
                </div>
            </div>

            <div class="modal-botoes">
                <button id="cancelar-editar-animal" class="btn btn-danger" type="button">Cancelar</button>
                <button class="btn btn-primary" type="submit">Salvar</button>
            </div>
        </form>
    </dialog>

    <!-- NOVO ANIMAL -->

    <dialog id="modal-novo-animal">
        <h2>Novo Animal</h2>
        <form>
            <input class="input-text" required type="text" name="nome" placeholder="Nome">

            <select class="input-text" name="especie" required>
                <option value="" disabled selected>Espécie</option>
                <option>Cachorro</option>
                <option>Gato</option>
            </select>

            <input class="input-text" required type="text" name="raca" placeholder="Raça">

            <input class="input-text" required type="text" name="cor" placeholder="Cor">

            <select class="input-text" name="sexo" required>
                <option value="" disabled selected>Sexo</option>
                <option>Macho</option>
                <option>Fêmea</option>
            </select>

            <input class="input-text" required type="date" name="nasc" placeholder="Data de nascimento">

            <label>Castrado?</label>
            <div class="group-radio">
                <div>
                    <input class="radio-btn" required type="radio" name="castrado" value="true">
                    <label>Sim</label>
                </div>

                <div>
                    <input class="radio-btn" type="radio" name="castrado" value="false">
                    <label>Não</label>
                </div>
            </div>

            <div class="modal-botoes">
                <button id="cancelar-novo-animal" class="btn btn-danger" type="button">Cancelar</button>
                <button class="btn btn-primary" type="submit">Salvar</button>
            </div>
        </form>
    </dialog>

    <!-- NOVA CONSULTA -->

    <dialog id="modal-nova-consulta">

        <h2>Nova Consulta</h2>

        <form>
            <input class="input-text" type="text" name="animal" readonly>
            <select class="input-text" name="veterinario" required>
                <option value="" disabled selected>Veterinario</option>
            </select>
            <input class="input-text" type="datetime-local" name="data-hora" placeholder="Data e horário" required>
            <input class="input-text" type="text" name="motivo" placeholder="Motivo" required>
            <input class="input-text" type="text" name="observacao" placeholder="Observação" required>
            <input class="input-text" type="text" name="valor" placeholder="Valor" required>
            <input class="input-text" type="text" name="forma-pagamento" placeholder="Forma de pagamento" required>

            <div class="modal-botoes">
                <button id="cancelar-nova-consulta" class="btn btn-danger" type="button">Cancelar</button>
                <button class="btn btn-primary" type="submit">Salvar</button>
            </div>
        </form>
    </dialog>

    <script src="../js/navbar.js"></script>
    <script src="../js/tutores-dados.js"></script>
    <script src="../js/animais.js"></script>
    <script src="../js/modais.js"></script>

</body>

</html>
