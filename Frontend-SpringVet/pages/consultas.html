<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/consultas.css">
    <link rel="shortcut icon" href="../assets/icone.ico" type="image/x-icon">
    <title>Consultas</title>
</head>
<body>
    <nav id="navbar"></nav>
    <main class="container">

        <div class="filtros">
            <input class="input-text" type="text" placeholder="Nome do animal ou veterinário">
            <input class="input-text-secondary" type="date">
            
            <label class="checkbox-container">
                <input type="checkbox" id="check-finalizada">
                <span>Finalizada</span>
            </label>
            
            <label class="checkbox-container">
                <input type="checkbox" id="check-cancelada">
                <span>Cancelada</span>
            </label>
                
            <button class="btn btn-outline">Buscar</button>
        </div>

        <div class="flex-box-consultas"></div>
    </main>

    <script src="../js/auth.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/consultas.js"></script>
</body>
</html>
