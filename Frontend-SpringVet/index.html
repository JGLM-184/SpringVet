<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/index.css">
    <link rel="shortcut icon" href="/assets/icone.ico" type="image/x-icon">
    <title>Login SpringVet</title>
</head>
<body>
    <main class="container">

        <div class="flex-box-login">
            <form id="form-login">
                <img class="img-login" src="/assets/logo.png" alt="">
                <h1>SpringVet</h1>
                <div>
                    <input type="email" class="input-text" id="exampleInputEmail1" placeholder="Email">
                </div>
                <div>
                    <input type="password" class="input-text" id="exampleInputPassword1" placeholder="Senha">
                </div>
                <button type="submit" class="btn btn-secondary">Entrar</button>
            </form>
        </div>
    </main>
</body>

<script src="js/login.js"></script>
</html>
