<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/index.css">
    <title>Login SpringVet</title>
</head>
<body>
    <main class="container">

        <div class="flex-box-logo">
            <h1 class="logo">SpringVet</h1>
            <img class="img-logo" src="assets/logo-512.png" alt="Logo SpringVet">
        </div>
        <div class="flex-box-login">
            <form>
                <img class="img-login" src="/assets/login.png" alt="Usuário">
                <div class="mb-3">
                    <input type="email" class="input-text" id="exampleInputEmail1" placeholder="Email">
                </div>
                <div class="mb-3">
                    <input type="password" class="input-text" id="exampleInputPassword1" placeholder="Senha">
                </div>
                <a href="/pages/home.html" class="btn-roxo">Entrar</a>
                <!--<button type="submit" class="btn-roxo">Entrar</button>-->
            </form>
        </div>
    </main>
</body>
</html>
